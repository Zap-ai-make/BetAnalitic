      distance: ">13 km/90"
      couverture_laterale: ">40m largeur"
      interventions_multizones: ">20/90"
    impacts:
      compacite_defensive: "+20%"
      fatigue: "substitué min 70 (70%)"
    exemples: ["Kanté", "Milinkovic-Savic", "Goretzka"]

  mezzala:
