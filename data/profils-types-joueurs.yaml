      position_moyenne: "< 40m but adverse"
      passes_cles: ">3.5/90"
      tirs: ">2.5/90"
    impacts:
      impact_buts: "+0.3"
      impact_assists: "+0.4"
      contribution_defensive: "-30%"
    exemples: ["Ødegaard", "Bruno Fernandes", "Maddison"]

  # ATTRIBUTS TECHNIQUES (6)
