      courses_interieur_exterieur: ">12/90"
      tirs_hors_surface: ">2.0/90"
      infiltrations: ">3.0/90"
    impacts:
      buts_depuis_milieu: "+0.25"
      desequilibre_defense: "+25%"
    exemples: ["Barella", "De Bruyne (variante)", "Gündogan"]

  milieu_offensif_pur:
