    criteres:
      capitaine: "souvent"
      organisation_defensive: "constant"
      communication: "élevée"
    impacts:
      stabilite_equipe: "+0.15 points"
      performance_jeunes: "+10%"
    exemples: ["Henderson", "Rodri", "Fernandinho"]

  intelligence_positionnelle:
    seuils_stats:
      placements_optimaux: ">85%"
      erreurs_positionnement: "<0.3/90"
    impacts:
      efficacite_defensive: "+25%"
      economie_energie: "-15% distance"
    exemples: ["Busquets", "Rodri", "Kroos"]

  regularite_elite:
