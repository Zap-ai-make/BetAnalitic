# ============================================================================
# ALGORITHME DE CLASSIFICATION AUTO
# ============================================================================
algorithme_classification:

  description: |
    Processus automatique Agent #2 pour classifier tout joueur
    Input: Stats brutes joueur
    Output: Tags + Impacts calculés

  etapes:

    1_collecte_stats:
      sources:
        - "FBref (stats avancées)"
        - "StatsBomb (via API si accès)"
        - "Understat (xG, xA)"
        - "Sportmonks (positions, événements)"
      stats_requises:
        - "Buts, assists, tirs, tirs cadrés"
        - "Passes (courtes, longues, clés, progressives)"
        - "Dribbles réussis, fautes subies"
        - "Tacles, interceptions, duels"
        - "Distance parcourue, sprints"
        - "Duels aériens gagnés/perdus"
        - "Touches par zone"
        - "xG, xA, xG Chain, xT"

    2_normalisation:
      per_90: "Toutes stats ramenées à /90 minutes"
      percentiles: "Calcul position vs ligue (FBref)"
      ajustement_poste: "Seuils adaptés par position"

    3_detection_tags:
      logique: |
        FOR chaque tag IN tags_position[joueur.position]:
          IF stats_joueur >= tag.seuils_stats:
            ASSIGN tag TO joueur
            CALCULATE impacts_tag

      exemple_finisseur_clinique: |
        IF joueur.buts_par_tir > 0.20
           AND joueur.conversion_xG > 1.05
           AND joueur.tirs_cadres_pct > 0.55:
          THEN:
            tags.append("finisseur_clinique")
            impacts["probabilite_but_joueur"] += 0.25
            impacts["impact_buts_equipe"] += 0.4

    4_detection_niveau_qualite:
      logique: |
        note_moyenne = moyenne_notes_10_derniers_matchs
        percentile = percentile_ligue[joueur.position]

        IF note >= 8.0 AND percentile >= 99:
          niveau = "elite_mondiale"
        ELIF note >= 7.0 AND percentile >= 90:
          niveau = "tres_bon"
        ELIF note >= 6.5 AND percentile >= 70:
          niveau = "bon"
        ELIF note >= 6.0 AND percentile >= 40:
          niveau = "moyen"
        ELSE:
          niveau = "faible"

        impacts_base = niveaux_qualite[niveau].impacts

    5_detection_synergies:
      logique: |
        FOR synergie IN synergies_tags:
          IF joueur.has_tag(synergie.tag1) AND coequipier.has_tag(synergie.tag2):
            impacts += synergie.impact_combine

      exemple: |
        IF joueur.tags.includes("finisseur_clinique")
           AND equipe.has("createur_passes"):
          impacts["impact_buts_equipe"] += 0.5

    6_verification_contre_indications:
      logique: |
        FOR tag IN joueur.tags:
          IF tag.has_contre_indications:
            FOR condition IN tag.contre_indications:
              IF contexte_match.matches(condition):
                impacts[condition.impact_negatif] = apply()

      exemple: |
        IF joueur.has_tag("braconnier_surface")
           AND equipe.creation_faible:
          impacts["impact_buts"] *= 0.5

    7_calcul_impacts_finaux:
      formule: |
        impact_final = impact_base_niveau
                     + SUM(impacts_tags)
                     + SUM(impacts_synergies)
                     - SUM(impacts_contre_indications)

      exemple_concret: |
        Joueur: Haaland vs Brighton (domicile)

        Niveau: elite_mondiale
          - impact_base_buts: +0.5

        Tags détectés:
          - finisseur_clinique: +0.4 buts
          - braconnier_surface: +0.3 buts
          - menace_aerienne: +0.3 corners
          - physique_dominant: +0.2 duels

        Synergies détectées:
          - finisseur + createur_passes (De Bruyne): +0.5

        Contre-indications: AUCUNE

        IMPACTS FINAUX:
          - impact_buts_equipe: +1.9
          - probabilite_but_Haaland: +55%
          - impact_corners: +0.3
          - dependance_score: 8.2

    8_output_agent2:
      format: |
        {
          "joueur_id": "haaland_erling",
          "match_id": "man_city_vs_brighton_2024_03_30",
          "niveau_qualite": "elite_mondiale",
          "tags_detectes": [
            "finisseur_clinique",
            "braconnier_surface",
            "menace_aerienne",
            "physique_dominant"
          ],
          "synergies_actives": [
            "finisseur_clinique__createur_passes"
          ],
          "contre_indications": [],
          "impacts_calcules": {
            "impact_buts_equipe": +1.9,
            "probabilite_but_joueur": +0.55,
            "impact_corners": +0.3,
            "dependance_score": 8.2
          },
          "confiance_classification": 0.92
        }

      transmission: "→ Agent #4 (Analyseur Compositions)"

