      compacite: "+15%"
    exemples: ["Kanté", "Milinkovic-Savic", "Goretzka"]

  dualite_aerienne:
    seuils_stats:
      duels_aeriens_pct: ">60%"
      duels_aeriens_defensifs: ">2.0/90"
    impacts:
      protection_corners: "+20%"
      sorties_gardien: "-15%"
    exemples: ["Pogba", "Fellaini", "Matic"]

  # ATTRIBUTS MENTAUX (3)
  # ---------------------
