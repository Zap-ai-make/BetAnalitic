      position_moyenne_respectee: ">90%"
      couverture_zones: ">95%"
      fautes: "<1.2/90"
    impacts:
      stabilite_defensive: "+20%"
      impact_buts_concedes: "-0.2"
    exemples: ["Busquets", "Rodri", "Jorginho"]

  couverture_laterale:
    seuils_stats:
      interventions_couloirs: ">8/90"
      largeur_couverture: ">35m"
    impacts:
