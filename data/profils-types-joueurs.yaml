# ============================================================================
# SYSTÈME DE CLASSIFICATION JOUEURS - TAG-BASED APPROACH
# ============================================================================
# Basé sur recherches professionnelles: SCOUTED, StatsBomb, Opta, TFA
#
# PHILOSOPHIE:
# - 5 niveaux de qualité (Elite → Faible)
# - 60 tags combinables par position
# - Classification automatique (stats → tags → impacts)
# - Scalable: fonctionne pour TOUS joueurs, TOUTES ligues
# - Pas de maintenance manuelle requise
#
# USAGE PAR AGENTS:
# - Agent #2: Collecte stats → Applique algo classification → Assigne tags
# - Agent #4: Consomme tags → Calcule impacts matchs → Ajuste probabilités
# ============================================================================

# ============================================================================
# NIVEAUX DE QUALITÉ GLOBAUX
# ============================================================================
niveaux_qualite:
  elite_mondiale:
    seuil_note: 8.0
    percentile: 99
    impact_base_buts: 0.5
    impact_base_points: 0.6
    dependance_score: 8.0
    exemples: ["Haaland", "Mbappé", "Rodri", "Saliba", "Alisson"]
    description: "Top 1% mondial, game-changers absolus"

  tres_bon:
    seuil_note: 7.0
    percentile: 90
    impact_base_buts: 0.3
    impact_base_points: 0.4
    dependance_score: 6.5
    exemples: ["Watkins", "Saka", "Rice", "Guéhi", "Raya"]
    description: "Internationaux confirmés, piliers d'équipes top"

  bon:
    seuil_note: 6.5
    percentile: 70
    impact_base_buts: 0.15
    impact_base_points: 0.2
    dependance_score: 5.0
    exemples: ["Calvert-Lewin", "Kudus", "Berge", "Tarkowski", "Pickford"]
    description: "Titulaires établis mid-table"

  moyen:
    seuil_note: 6.0
    percentile: 40
    impact_base_buts: 0.05
    impact_base_points: 0.1
    dependance_score: 3.0
    exemples: ["Beto", "McNeil", "Doucouré", "Coady", "Neto"]
    description: "Rotation/remplaçants équipes top, titulaires bottom-table"

  faible:
    seuil_note: 5.5
    percentile: 20
    impact_base_buts: -0.05
    impact_base_points: -0.1
    dependance_score: 1.5
    exemples: ["Joueurs Championship/League One en PL"]
    description: "Sous le niveau, impact négatif potentiel"

# ============================================================================
# TAGS ATTAQUANTS (24 tags)
# ============================================================================
tags_attaquants:

  # ARCHÉTYPES PRINCIPAUX (7)
  # -------------------------
  finisseur_clinique:
    seuils_stats:
      buts_par_tir: ">0.20"
      conversion_xG: ">1.05"
      tirs_cadres_pct: ">55%"
    impacts:
      probabilite_but_joueur: "+25%"
      impact_buts_equipe: "+0.4"
    synergies:
      - createur_passes (ensemble: +0.5 buts)
      - menace_aerienne (ensemble: impact corners +0.3)
    exemples: ["Haaland", "Kane", "Lewandowski"]

  braconnier_surface:
    seuils_stats:
      touches_par_90: "<35"
      tirs_par_90: ">3.5"
      zone_tirs: "penalty_area >80%"
      buts_par_90: ">0.50"
    impacts:
      probabilite_but_joueur: "+30%"
      dependance_service: 8.0
    contre_indications:
      - Si équipe création faible: impact_buts -50%
    exemples: ["Haaland (variante)", "Inzaghi (historique)"]

  pivot_cible:
    seuils_stats:
      taille: ">185cm"
      duels_aeriens_pct: ">65%"
      passes_recues: ">25/90"
    impacts:
      impact_corners_adverses: "+0.3"
      impact_coups_francs: "+15%"
      assists_indirect: "+0.2"
    synergies:
      - ailiers_centres (ensemble: +0.4 buts équipe)
    exemples: ["Giroud", "Weghorst", "Núñez (physique)"]

  faux_neuf:
    seuils_stats:
      passes_cles: ">2.0/90"
      assists: ">0.35/90"
      touches_hors_surface: ">60%"
      recul_zone_defensive: ">15 actions/90"
    impacts:
      impact_buts: "+0.2"
      impact_assists_equipe: "+0.4"
      changement_dynamique: true
    exemples: ["Firmino", "Havertz", "Benzema (évolution)"]

  dribbleur_explosif:
    seuils_stats:
      dribbles_reussis: ">4.0/90"
      fautes_subies: ">2.5/90"
      vitesse_pointe: ">34 km/h"
    impacts:
      impact_cartons_adverses: "+0.4"  # EDGE ⭐
      impact_penalties: "+20%"
      chaos_defensif: "+25%"
    synergies:
      - vitesse_exceptionnelle (ensemble: +0.5 cartons)
    exemples: ["Mbappé", "Vinícius Jr", "Grealish"]

  attaquant_pressing:
    seuils_stats:
      pressures: ">15/90"
      intensite_pressing: ">8.5"
      sprints_defensifs: ">30/90"
    impacts:
      impact_recuperations_hautes: "+0.3"
      impact_defensif_equipe: "+0.2 points"
      fatigue: "remplacé minute 70 (65%)"
    exemples: ["Firmino", "Jesus", "Weghorst (variante)"]

  avant_centre_complet:
    seuils_stats:
      buts: ">0.45/90"
      assists: ">0.25/90"
      duels_aeriens: ">50%"
      dribbles: ">2.0/90"
      pressing: ">10/90"
    impacts:
      polyvalence: "+0.3 buts, +0.2 assists"
      adaptabilite: "tous systèmes +20%"
    exemples: ["Kane", "Benzema", "Lewandowski (complet)"]

  # ATTRIBUTS PHYSIQUES (5)
  # -----------------------
  vitesse_exceptionnelle:
    seuils_stats:
      vitesse_pointe: ">35 km/h"
      sprints: ">40/90"
    impacts:
      impact_contre_attaques: "+0.4 buts"
      impact_profondeur: "+30%"
      bonus_vs_defense_haute: "+0.3 buts"
    exemples: ["Mbappé", "Adama Traoré", "Walker"]

  physique_dominant:
    seuils_stats:
      poids: ">85kg"
      duels_physiques_pct: ">65%"
      force_impact: "top 20%"
    impacts:
      impact_duels: "+0.2"
      resistance_blessures: "-20% durée abs"
    exemples: ["Haaland", "Lukaku", "Adebayo"]

  endurance_elite:
    seuils_stats:
      distance: ">12 km/90"
      intensite_maintenue: ">85% (60-90min)"
    impacts:
      performance_fin_match: "+30% (75-90min)"
      fatigue_reduite: "-50%"
    exemples: ["Salah", "Son", "Kante"]

  menace_aerienne:
    seuils_stats:
      buts_tete: ">25%"
      duels_aeriens_offensifs: ">3.0/90"
      detente: ">70cm"
    impacts:
      impact_corners: "+0.3"
      impact_coups_francs: "+25%"
    exemples: ["Giroud", "Ronaldo", "Van Dijk"]

  agilite_exceptionnelle:
    seuils_stats:
      changements_direction: ">20/90"
      dribbles_espaces_reduits: ">70%"
    impacts:
      efficacite_pressing: "+30%"
      creation_espaces: "+0.2 xG équipe"
    exemples: ["Messi", "Neymar", "Bernardo Silva"]

  # TECHNIQUES SPÉCIALISÉES (6)
  # ---------------------------
  finition_pied_faible:
    seuils_stats:
      buts_pied_faible_pct: ">30%"
      precision_pied_faible: ">80%"
    impacts:
      impredictibilite: "+15%"
      efficacite_situations: "+20%"
    exemples: ["Son", "Dembélé", "Sane"]

  specialiste_coups_francs:
    seuils_stats:
      conversion_coups_francs: ">8%"
      coups_francs_cadres: ">40%"
    impacts:
      xG_coups_francs: "+0.15 par match"
      impact_cartons: "+0.1 (CF provoqués)"
    exemples: ["Ward-Prowse", "Dybala", "Messi"]

  tireur_lointain:
    seuils_stats:
      tirs_hors_surface: ">2.0/90"
      buts_hors_surface_pct: ">15%"
    impacts:
      xG_distance: "+0.2"
      pression_defense: "+20% espaces"
    exemples: ["De Bruyne", "Schick", "Bruno Fernandes"]

  dribbles_techniques:
    seuils_stats:
      dribbles_reussis_pct: ">70%"
      combinaisons_1-2: ">3.0/90"
    impacts:
      progression_ballon: "+0.3 xT"
      creation_superiorite: "+25%"
    exemples: ["Grealish", "Saint-Maximin", "Zaha"]

  finition_une_touche:
    seuils_stats:
      buts_une_touche_pct: ">40%"
      timing_appels: "top 10%"
    impacts:
      efficacite_contre_attaques: "+40%"
      buts_centres: "+0.3"
    exemples: ["Haaland", "Ronaldo", "Vardy"]

  joueur_grands_matchs:
    seuils_stats:
      performance_top6: ">+15% vs moyenne"
      buts_decisifs: ">50%"
    impacts:
      bonus_big_games: "+0.3 buts"
      clutch_factor: "+40%"
    exemples: ["Drogba (historique)", "Benzema", "Salah"]

  # INTELLIGENCE DE JEU (6)
  # -----------------------
  timing_appels:
    seuils_stats:
      courses_hors_jeu_pct: "<15%"
      appels_reussis: ">8.0/90"
    impacts:
      efficacite_passes_profondes: "+30%"
      xG_moyen: "+20%"
    exemples: ["Haaland", "Vardy", "Inzaghi"]

  lecture_jeu_offensive:
    seuils_stats:
      anticipations: ">5.0/90"
      placements_xG: "top 15%"
    impacts:
      qualite_positions: "+0.25 xG"
    exemples: ["Müller", "Benzema", "Kane"]

  decrochages_intelligents:
    seuils_stats:
      recul_porteur: ">15 actions/90"
      passes_recues_entre_lignes: ">10/90"
    impacts:
      creation_espaces: "+0.2 xG équipe"
      liberation_ailiers: "+20%"
    exemples: ["Firmino", "Benzema", "Havertz"]

  prises_risques_calculees:
    seuils_stats:
      tentatives_risquees: ">5/90"
      reussite: ">40%"
    impacts:
      moments_genie: "+0.15 buts inattendus"
    exemples: ["Neymar", "Hazard", "Vinícius"]

  vision_passes:
    seuils_stats:
      passes_cles: ">2.5/90"
      expected_assists: ">0.4/90"
    impacts:
      impact_assists: "+0.3"
      creation_chances: "+30%"
    exemples: ["Kane", "Benzema", "Firmino"]

  adaptation_tactique:
    criteres:
      flexibilite_positions: ">3 positions"
      efficacite_multi_systemes: ">85%"
    impacts:
      polyvalence: "+0.2 tous contextes"
    exemples: ["Griezmann", "Havertz", "Müller"]

# ============================================================================
# TAGS MILIEUX (22 tags)
# ============================================================================
