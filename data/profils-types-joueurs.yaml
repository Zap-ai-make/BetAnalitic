      passes_cles: ">3.0/90"
      expected_assists: ">0.35/90"
      passes_profondes: ">5.0/90"
    impacts:
      impact_xG_equipe: "+0.5"
      impact_assists: "+0.3"
    exemples: ["Modric", "Kroos", "Xabi Alonso"]

  mangeur_espaces:
