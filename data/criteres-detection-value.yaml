# ============================================================================
# SYSTÈME DE DÉTECTION VALUE - AGENT #6
# ============================================================================
# Cerveau décisionnel du système multi-agents
#
# PHILOSOPHIE SHARP BETTING:
# - On ne parie QUE quand on a un EDGE mathématique
# - VALUE = Probabilité réelle > Probabilité implicite bookmaker
# - Kelly Criterion pour sizing optimal
# - Discipline absolue: pas d'émotions, QUE des maths
#
# INPUT: Agent #4 (probabilités ajustées) + Agent #5 (cotes bookmakers)
# OUTPUT: Décisions BET/NO BET + Sizing Kelly + Score confiance
# ============================================================================

# ============================================================================
# DÉFINITION DE LA VALUE
# ============================================================================
concept_value:

  definition: |
    VALUE existe quand notre estimation de probabilité réelle
    est SUPÉRIEURE à la probabilité implicite de la cote bookmaker.

    C'est la SEULE raison valable de parier.

  formule_probabilite_implicite:
    calcul: "1 / cote_decimale"
    exemple_1:
      cote: 2.00
      proba_implicite: "1 / 2.00 = 50%"
    exemple_2:
      cote: 1.80
      proba_implicite: "1 / 1.80 = 55.6%"
    exemple_3:
      cote: 3.50
      proba_implicite: "1 / 3.50 = 28.6%"

  formule_edge:
    calcul: "(proba_reelle - proba_implicite) / proba_implicite * 100"
    interpretation:
      edge_positif: "VALUE détectée → Parier"
      edge_negatif: "PAS de value → Ne PAS parier"
      edge_nul: "Fair odds → Ne PAS parier (marge nulle)"

  exemple_concret:
    match: "Man City vs Brighton"
    marche: "City victoire"
    cote_bookmaker: 1.40
    proba_implicite: "1 / 1.40 = 71.4%"
    notre_estimation: "78% (Rodri titulaire, Brighton 3 défenseurs blessés)"
    edge_calcule: "(78% - 71.4%) / 71.4% = +9.2%"
    decision: "✅ BET - Value de +9.2%"

  anti_exemple:
    match: "Man City vs Brighton"
    marche: "City victoire"
    cote_bookmaker: 1.30
    proba_implicite: "1 / 1.30 = 76.9%"
    notre_estimation: "78% (mêmes conditions)"
    edge_calcule: "(78% - 76.9%) / 76.9% = +1.4%"
    decision: "❌ NO BET - Edge trop faible (<3% seuil minimum)"

# ============================================================================
# SEUILS DE VALUE PAR NIVEAU DE CONFIANCE
# ============================================================================
seuils_value:

  description: |
    Plus notre confiance est élevée, plus on peut accepter un edge faible.
    Moins on est confiant, plus on exige un edge important.

  niveau_confiance_elite:
    criteres:
      - "Data complète sur 10+ matchs récents"
      - "Tous joueurs clés classifiés avec confiance >0.9"
      - "Edges multiples identifiés (2+ edges cumulés)"
      - "Contexte stable (pas de surprise compos)"
    seuil_edge_minimum: 3.0
    exemples_situations:
      - "Rodri titulaire Man City (edge validé 87% vs 62%)"
      - "Alisson catcher + Van Dijk (edge corners -0.35)"
      - "Mbappé dribbleur vs défense cartonneuse"

  niveau_confiance_haute:
    criteres:
      - "Data complète récente"
      - "Joueurs clés classifiés confiance >0.8"
      - "1-2 edges identifiés"
      - "Quelques incertitudes mineures"
    seuil_edge_minimum: 5.0
    exemples_situations:
      - "Edge unique fort (ex: catcher seul)"
      - "Composition confirmée mais pas d'historique récent"

  niveau_confiance_moyenne:
    criteres:
      - "Data partielle ou moins récente"
      - "Joueurs clés classifiés confiance 0.6-0.8"
      - "Edge théorique mais peu validé"
      - "Incertitudes notables"
    seuil_edge_minimum: 8.0
    exemples_situations:
      - "Nouveau joueur sans historique suffisant"
      - "Système tactique inhabituel"
      - "Edge basé sur extrapolation"

  niveau_confiance_faible:
    criteres:
      - "Data incomplète"
      - "Joueurs clés classification douteuse"
      - "Nombreuses incertitudes"
    seuil_edge_minimum: 12.0
    note: "En pratique, on évite de parier avec confiance faible"

  tableau_decision:
    regles: |
      IF edge >= seuil_confiance:
        THEN: BET (avec Kelly sizing)
      ELSE:
        THEN: NO BET

    exemples:
      - confiance: "Elite"
        edge: 4.0
        seuil: 3.0
        decision: "✅ BET"

      - confiance: "Haute"
        edge: 4.0
        seuil: 5.0
        decision: "❌ NO BET (edge insuffisant)"

      - confiance: "Elite"
        edge: 9.0
        seuil: 3.0
        decision: "✅ BET (edge excellent)"

      - confiance: "Moyenne"
        edge: 7.0
        seuil: 8.0
        decision: "❌ NO BET"

# ============================================================================
# KELLY CRITERION - SIZING OPTIMAL
# ============================================================================
kelly_criterion:

  philosophie: |
    Le Kelly Criterion calcule la taille OPTIMALE du pari
    pour maximiser la croissance long-terme de la bankroll
    tout en minimisant le risque de ruine.

    C'est la SEULE méthode mathématiquement prouvée pour le sizing.

  formule_complete:
    equation: "f = (bp - q) / b"
    variables:
      f: "Fraction de bankroll à miser"
      b: "Cote décimale - 1 (gain net)"
      p: "Probabilité réelle de gagner (notre estimation)"
      q: "Probabilité de perdre (1 - p)"

  formule_simplifiee:
    equation: "f = (p * cote - 1) / (cote - 1)"
    utilisation: "Plus pratique pour calculs rapides"

  exemple_calcul_1:
    contexte: "Man City victoire"
    cote: 1.40
    b: "1.40 - 1 = 0.40"
    p: 0.78
    q: 0.22
    calcul: "f = (0.40 * 0.78 - 0.22) / 0.40"
    resultat: "f = (0.312 - 0.22) / 0.40 = 0.23 = 23%"
    interpretation: "Kelly suggère miser 23% de la bankroll"

  exemple_calcul_2:
    contexte: "Liverpool OVER 2.5 buts"
    cote: 2.10
    p: 0.55
    q: 0.45
    calcul: "f = (0.55 * 2.10 - 1) / (2.10 - 1)"
    resultat: "f = (1.155 - 1) / 1.10 = 0.141 = 14.1%"
    interpretation: "Kelly suggère miser 14.1% de la bankroll"

  fractional_kelly:
    description: |
      Le Full Kelly est TRÈS agressif et volatile.
      Les professionnels utilisent du Fractional Kelly pour réduire variance.

    recommandations:
      quarter_kelly:
        fraction: "25% du Kelly"
        usage: "Conservateur, bankroll protection"
        avantage: "Variance réduite de 94%"
        inconvenient: "Croissance plus lente"

      third_kelly:
        fraction: "33% du Kelly"
        usage: "Équilibré, recommandé pour débuter"
        avantage: "Bon compromis croissance/risque"

      half_kelly:
        fraction: "50% du Kelly"
        usage: "Modéré, growth acceptable"
        avantage: "Variance réduite de 75%"
        inconvenient: "Croissance réduite de 25%"

      full_kelly:
        fraction: "100% du Kelly"
        usage: "Agressif, professionnels expérimentés"
        avantage: "Croissance maximale théorique"
        inconvenient: "Variance ÉNORME, drawdowns sévères"

  notre_strategie:
    recommandation: "1/3 KELLY (33%)"
    justification:
      - "Réduit variance significativement"
      - "Protège contre erreurs estimation"
      - "Croissance long-terme solide"
      - "Psychologiquement supportable"

  plafonds_securite:
    max_absolu_par_pari: "5% bankroll"
    justification: |
      Même si Kelly suggère plus, JAMAIS dépasser 5% sur un seul pari.
      Protection contre erreurs grossières d'estimation.

    max_exposition_totale: "20% bankroll"
    justification: |
      Somme de tous paris en cours ne doit jamais excéder 20% bankroll.
      Protection contre corrélation cachée entre paris.

  exemple_complet_sizing:
    bankroll: 1000
    kelly_full: "23%"
    notre_strategie: "1/3 Kelly = 23% / 3 = 7.67%"
    plafond_5pct: "5%"
    mise_finale: "50€ (5% de 1000€)"
    explication: "Kelly suggère 7.67% mais on plafonne à 5% sécurité"

# ============================================================================
# EDGES EXPLOITABLES PAR MARCHÉ
# ============================================================================
edges_par_marche:

  # CORNERS
  # -------
  corners_total:
    edge_1_catcher:
      description: "Gardien catcher réduit corners équipe"
      impact: "-0.2 corners"
      confiance: "Haute (validé Liverpool, Arsenal)"
      detection:
        condition: "gardien.has_tag('catcher') AND catch_rate >0.65"
        ajustement_proba: "-0.2 corners sur total équipe"
      exemple_concret:
        match: "Liverpool vs Everton"
        ligne_bookmaker: "Corners Liverpool 5.5"
        alisson_catcher: "catch_rate 0.71"
        ajustement: "-0.2 corners"
        ligne_ajustee: "5.3 corners attendus"
        cote_under_5_5: 2.10
        proba_implicite: "47.6%"
        notre_proba: "55%"
        edge: "+15.5%"
        decision: "✅ BET UNDER 5.5 corners Liverpool"

    edge_2_puncher:
      description: "Gardien puncher augmente corners équipe"
      impact: "+0.15 corners"
      confiance: "Moyenne (moins validé que catcher)"
      detection:
        condition: "gardien.has_tag('puncher') AND punch_rate >0.65"
        ajustement_proba: "+0.15 corners sur total équipe"

    edge_3_pivot_cible:
      description: "Attaquant pivot cible génère corners adverses"
      impact: "+0.3 corners adverses"
      confiance: "Moyenne (connu mais sous-estimé)"
      detection:
        condition: "attaquant.has_tag('pivot_cible') AND duels_aeriens >65%"
        ajustement_proba: "+0.3 corners adverses"

    combinaison_edges:
      exemple:
        match: "Arsenal (Raya catcher 68%) vs Aston Villa (Watkins pivot)"
        edge_raya: "-0.2 corners Arsenal"
        edge_watkins: "+0.3 corners Arsenal (défense)"
        effet_net: "+0.1 corners Arsenal"
        ligne_bookmaker: "5.5"
        ligne_ajustee: "5.6"
        interpretation: "Léger biais OVER mais insuffisant pour bet"

  # CARTONS
  # -------
  cartons_total:
    edge_1_dribbleur_explosif:
      description: "Dribbleurs subissent fautes → Cartons adverses ⭐"
      impact: "+0.4 cartons adverses"
      confiance: "HAUTE - Edge majeur sous-exploité"
      detection:
        condition: "attaquant.has_tag('dribbleur_explosif') AND fautes_subies >2.5/90"
        ajustement_proba: "+0.4 cartons adverses"
      exemple_concret:
        match: "PSG (Mbappé) vs Marseille"
        ligne_bookmaker: "Total cartons 4.5"
        mbappe_stats:
          dribbles_reussis: 5.2
          fautes_subies: 3.1
          vitesse_pointe: 36
        tags: ["dribbleur_explosif", "vitesse_exceptionnelle"]
        ajustement: "+0.4 cartons (Mbappé provoque)"
        ligne_ajustee: "4.9 cartons attendus"
        cote_over_4_5: 1.90
        proba_implicite: "52.6%"
        notre_proba: "61%"
        edge: "+16%"
        decision: "✅ BET OVER 4.5 cartons"

    edge_2_destructeur:
      description: "Milieu destructeur commet fautes"
      impact: "+0.3 cartons propres"
      confiance: "Moyenne (bien connu bookmakers)"
      detection:
        condition: "milieu.has_tag('destructeur') AND fautes >2.0/90"
        ajustement_proba: "+0.3 cartons équipe"

    edge_3_arbitre:
      description: "Historique arbitre"
      impact: "Variable ±0.5 cartons"
      confiance: "Haute (data fiable)"
      detection:
        condition: "arbitre.cartons_moyens vs moyenne_ligue"
        ajustement_proba: "écart à moyenne * 0.8"
      exemple:
        arbitre: "Anthony Taylor"
        moyenne_ligue: "4.2 cartons/match"
        moyenne_taylor: "5.1 cartons/match"
        ecart: "+0.9"
        ajustement: "+0.72 cartons (0.9 * 0.8)"

  # BUTS & RÉSULTAT
  # ---------------
  buts_total:
    edge_1_sentinelle_absent:
      description: "Absence Rodri-type = GROS impact ⭐⭐⭐"
      impact: "+0.4 buts concédés, -0.3 buts marqués"
      confiance: "TRÈS HAUTE - Edge validé"
      detection:
        condition: "milieu_sentinelle.absent AND dependance_score >8.0"
        ajustement_proba: "+0.4 xG adversaire, -0.3 xG équipe"
      exemple_concret:
        match: "Man City (sans Rodri) vs Bournemouth"
        ligne_bookmaker: "City -1.5 @ 1.50"
        proba_implicite_city: "66.7%"
        ajustement_rodri_absent:
          impact_buts_city: "-0.3"
          impact_buts_contre: "+0.4"
          impact_points: "-0.6"
        notre_proba_city: "54%"
        edge_bournemouth: "+23.5%"
        decision: "✅ BET Bournemouth +1.5 @ 2.50 (GROSSE value)"

    edge_2_finisseur_elite:
      description: "Finisseur clinique elite + créateur"
      impact: "+0.5 buts équipe (avec synergie)"
      confiance: "Haute"
      detection:
        condition: "attaquant.has_tag('finisseur_clinique') AND attaquant.niveau='elite_mondiale' AND equipe.has_tag('createur_passes')"
        ajustement_proba: "+0.5 xG équipe"
      exemple:
        match: "Man City (Haaland + De Bruyne) vs Brighton"
        xG_base_city: 2.1
        synergie_haaland_kdb: "+0.5"
        xG_ajuste: 2.6
        ligne_over_2_5: 1.60
        notre_proba: "72%"
        proba_implicite: "62.5%"
        edge: "+15.2%"
        decision: "✅ BET OVER 2.5 buts"

    edge_3_defense_haute_vs_vitesse:
      description: "Défense haute vs attaquants vitesse = danger"
      impact: "+0.4 buts attaquants rapides"
      confiance: "Haute"
      detection:
        condition: "defense.ligne_haute >65m AND attaquant_adverse.has_tag('vitesse_exceptionnelle')"
        ajustement_proba: "+0.4 xG attaquants rapides"
      exemple:
        match: "Arsenal (ligne haute 68m) vs Liverpool (Salah vitesse 35km/h)"
        ajustement: "+0.4 xG Liverpool"
        marche: "Liverpool BTTS"
        decision: "Favorable Liverpool marquer"

  # RÉSULTAT EXACT
  # --------------
  resultat_match:
    edge_1_equilibre_forces:
      description: "Quand équipes équilibrées, X sous-évalué"
      impact: "+5% probabilité X"
      confiance: "Moyenne"
      detection:
        condition: "ABS(proba_1 - proba_2) < 10%"
        ajustement: "+5% sur X"

    edge_2_domination_ecrasante:
      description: "Très gros favoris, large victoire sous-évaluée"
      impact: "Décalage vers victoires larges"
      confiance: "Moyenne"
      detection:
        condition: "proba_victoire >75% AND edge_qualite >2.0"
        ajustement: "Favoriser -1.5, -2.5 handicaps"

# ============================================================================
# FILTRES DE CONFIANCE - QUAND NE PAS PARIER
# ============================================================================
filtres_confiance:

  description: |
    Situations où on S'ABSTIENT même si edge mathématique apparent.
    Protection contre pièges et fausses value.

  filtre_1_donnees_incomplete:
    regle: "Si data critique manquante → NO BET"
    exemples:
      - "Composition non confirmée (<3h du match)"
      - "Joueur clé statut incertain (blessure douteuse)"
      - "Stats insuffisantes (nouveau joueur <5 matchs)"
    justification: "Edge basé sur hypothèses = fausse value"

  filtre_2_confiance_classification:
    regle: "Si confiance_classification <0.70 → NO BET"
    exemple:
      joueur: "Nouveau transfert Ligue 1 vers PL"
      classification: "Tags basés stats Ligue 1"
      confiance: 0.65
      decision: "❌ NO BET - Attendre validation PL"

  filtre_3_correlation_cachee:
    regle: "Si paris multiples sur événements corrélés → Réduire sizing"
    exemples:
      - "OVER 2.5 buts + BTTS sur même match (corrélés)"
      - "City victoire + Liverpool victoire (indépendants mais budget total limité)"
    ajustement: "Sizing total <20% bankroll"

  filtre_4_variance_elevee:
    regle: "Si marché haute variance → Augmenter seuil edge"
    marches_haute_variance:
      - "Score exact (+30% seuil edge)"
      - "Premier buteur (+40% seuil edge)"
      - "Nombre de corners exact (+35% seuil edge)"
    justification: "Variance mange edge sur échantillons moyens"

  filtre_5_cote_extreme:
    regle: "Si cote <1.20 ou >5.00 → Scepticisme élevé"
    cotes_basses:
      probleme: "Edge % élevé requis pour profit significatif"
      exemple: "Cote 1.15 → Besoin edge >10% pour value réelle"
    cotes_hautes:
      probleme: "Variance énorme, erreur estimation critique"
      exemple: "Cote 5.00 → Notre estimation fiable à 25% vs 20%?"

  filtre_6_mouvement_cote_suspect:
    regle: "Si cote bouge massivement contre nous → Investiguer"
    exemple:
      cote_initiale: "City 1.50"
      cote_actuelle: "City 1.80"
      mouvement: "+20%"
      causes_possibles:
        - "Info blessure non publique"
        - "Sharp money sur adversaire"
        - "Nous avons raté quelque chose"
      decision: "⚠️ PAUSE - Vérifier avant bet"

  filtre_7_piege_bookmaker:
    description: "Lignes inhabituelles = piège potentiel"
    exemples:
      - "Ligne corners 2 points hors norme historique"
      - "Cote résultat 30% plus généreuse qu'autres bookmakers"
      - "Marché ouvert puis fermé puis rouvert différent"
    decision: "❌ NO BET - Si trop beau pour être vrai, probablement faux"

# ============================================================================
# ALGORITHME DE DÉCISION COMPLET
# ============================================================================
algorithme_decision:

  description: |
    Processus Agent #6 pour chaque opportunité potentielle.
    Input: Proba Agent #4 + Cotes Agent #5
    Output: BET/NO BET + Sizing + Confiance

  etape_1_calcul_edge:
    input:
      proba_reelle: "De Agent #4"
      cote_bookmaker: "De Agent #5"
    processus: |
      proba_implicite = 1 / cote_bookmaker
      edge = (proba_reelle - proba_implicite) / proba_implicite * 100
    output:
      edge_pct: "Pourcentage d'edge"

  etape_2_evaluation_confiance:
    input:
      sources_edges: "Liste edges détectés"
      qualite_data: "Complétude données"
      confiance_classification: "Moyenne confiance tags joueurs"
    processus: |
      IF all_data_complete AND confiance_classification >0.9 AND edges_multiples:
        niveau_confiance = "Elite"
      ELIF most_data_complete AND confiance_classification >0.8:
        niveau_confiance = "Haute"
      ELIF partial_data AND confiance_classification >0.6:
        niveau_confiance = "Moyenne"
      ELSE:
        niveau_confiance = "Faible"
    output:
      niveau_confiance: "Elite/Haute/Moyenne/Faible"
      seuil_edge_requis: "Basé sur niveau"

  etape_3_filtres_confiance:
    processus: |
      FOR filtre IN filtres_confiance:
        IF filtre.condition == TRUE:
          RETURN NO_BET (raison: filtre.description)
    output:
      passe_filtres: "Boolean"
      raison_rejet: "Si filtres échouent"

  etape_4_comparaison_seuil:
    processus: |
      IF edge < seuil_edge_requis:
        RETURN NO_BET (raison: "Edge insuffisant")
      ELSE:
        PROCEED to sizing
    output:
      decision_preliminaire: "BET/NO_BET"

  etape_5_kelly_sizing:
    processus: |
      kelly_full = (proba_reelle * cote - 1) / (cote - 1)
      kelly_fraction = kelly_full / 3  # 1/3 Kelly stratégie
      mise_proposee = bankroll * kelly_fraction

      IF mise_proposee > 0.05 * bankroll:
        mise_finale = 0.05 * bankroll  # Plafond 5%
      ELSE:
        mise_finale = mise_proposee
    output:
      mise_finale: "Montant en €"
      pct_bankroll: "Pourcentage"

  etape_6_verification_exposition:
    processus: |
      exposition_actuelle = SUM(mises_en_cours)
      exposition_apres = exposition_actuelle + mise_finale

      IF exposition_apres > 0.20 * bankroll:
        RETURN NO_BET (raison: "Exposition totale >20%")
    output:
      exposition_ok: "Boolean"

  etape_7_output_final:
    format: |
      {
        "decision": "BET / NO_BET",
        "match_id": "man_city_vs_brighton_2024_03_30",
        "marche": "Man City victoire",
        "cote": 1.40,
        "probabilite_reelle": 0.78,
        "probabilite_implicite": 0.714,
        "edge": 9.2,
        "niveau_confiance": "Elite",
        "seuil_requis": 3.0,
        "kelly_full": 0.23,
        "kelly_fraction": 0.077,
        "mise_recommandee": 77,
        "pct_bankroll": 7.7,
        "mise_plafonnee": 50,
        "pct_plafonne": 5.0,
        "edges_detectes": [
          "Rodri titulaire (+0.7 points)",
          "Brighton 3 défenseurs blessés (-0.4 points)"
        ],
        "confiance_score": 9.2,
        "raison": "Edge solide (9.2%), confiance Elite, Rodri impact validé",
        "timestamp": "2024-03-30T09:45:00Z"
      }

