# ============================================================================
# SCORING & PRIORISATION DES OPPORTUNITÉS
# ============================================================================
scoring_opportunites:

  description: |
    Si plusieurs opportunités détectées simultanément,
    comment prioriser quand budget/exposition limité?

  criteres_scoring:

    edge_pct:
      poids: 40
      calcul: "edge_pct * 4"
      exemple:
        edge_10pct: "10 * 4 = 40 points"
        edge_20pct: "20 * 4 = 80 points (plafonné 100)"

    confiance:
      poids: 30
      calcul: "confiance_score * 3"
      exemple:
        confiance_9: "9 * 3 = 27 points"
        confiance_7: "7 * 3 = 21 points"

    kelly_sizing:
      poids: 20
      calcul: "(kelly_pct / 5%) * 20"
      justification: "Plus Kelly suggère gros, plus opportunité forte"
      exemple:
        kelly_5pct: "(5 / 5) * 20 = 20 points"
        kelly_2pct: "(2 / 5) * 20 = 8 points"

    liquidite_marche:
      poids: 10
      calcul: "liquidite_score * 10"
      justification: "Marchés liquides = moins risque ligne piège"
      exemple:
        marche_principal: "1.0 * 10 = 10 points (résultat, O/U buts)"
        marche_secondaire: "0.6 * 10 = 6 points (corners, cartons)"
        marche_exotique: "0.3 * 10 = 3 points (score exact)"

  formule_score_total:
    equation: "score = edge_points + confiance_points + kelly_points + liquidite_points"
    maximum: 100
    minimum: 0

  interpretation_scores:
    elite_90_100:
      description: "Opportunité exceptionnelle ⭐⭐⭐"
      action: "BET PRIORITAIRE (si exposition permet)"
      frequence: "Rare (1-2 par semaine)"

    excellent_75_89:
      description: "Très bonne opportunité ⭐⭐"
      action: "BET FORT"
      frequence: "Occasionnel (3-5 par semaine)"

    bon_60_74:
      description: "Bonne opportunité ⭐"
      action: "BET STANDARD"
      frequence: "Régulier (5-10 par semaine)"

    acceptable_50_59:
      description: "Opportunité acceptable"
      action: "BET si exposition faible, sinon skip"
      frequence: "Fréquent (10-15 par semaine)"

    marginal_40_49:
      description: "Opportunité marginale"
      action: "NO BET (sauf circonstances spéciales)"
      frequence: "Très fréquent"

  exemple_priorisation:
    situation: "3 opportunités simultanées, exposition permet 2 paris"

    opportunite_A:
      match: "Liverpool corners"
      edge: 15.5
      confiance: 9.1
      kelly: 1.67
      liquidite: 0.8
      score_calcule: "62 + 27.3 + 6.7 + 8 = 104 → 100 (plafonné)"
      priorite: 1

    opportunite_B:
      match: "PSG cartons"
      edge: 29.3
      confiance: 8.8
      kelly: 5.0
      liquidite: 0.6
      score_calcule: "100 + 26.4 + 20 + 6 = 152 → 100 (plafonné)"
      priorite: 1

    opportunite_C:
      match: "Arsenal BTTS"
      edge: 8.0
      confiance: 7.2
      kelly: 2.1
      liquidite: 1.0
      score_calcule: "32 + 21.6 + 8.4 + 10 = 72"
      priorite: 3

    decision:
      paris_acceptes: ["Opportunite_A", "Opportunite_B"]
      paris_refuses: ["Opportunite_C"]
      raison: "Scores A et B = 100 (max), C = 72 (bon mais moins prioritaire)"

# ============================================================================
# GESTION BANKROLL & PROTECTION
# ============================================================================
gestion_bankroll:

  philosophie: |
    La bankroll est notre capital de guerre.
    SURVIVRE est plus important que CROÎTRE vite.
    "Il faut être présent pour gagner."

  regles_absolues:

    regle_1_never_all_in:
      description: "JAMAIS miser >5% sur un seul pari"
      justification: "Protection contre erreur catastrophique"
      exemple_violation:
        mise: "10% bankroll sur cote 1.50"
        si_lose: "-10% bankroll"
        si_5_loses_consecutives: "-50% bankroll (récupération très difficile)"

    regle_2_exposition_max:
      description: "JAMAIS >20% bankroll exposée simultanément"
      justification: "Protection contre corrélation cachée"
      exemple:
        paris_en_cours:
          - "City victoire: 5%"
          - "Liverpool O2.5: 4%"
          - "Arsenal -1: 5%"
          - "PSG cartons: 5%"
        total: "19%"
        nouveau_pari: "3%"
        decision: "❌ REFUSE (total 22% > 20%)"

    regle_3_stop_loss_journalier:
      description: "Si -10% bankroll en une journée → STOP"
      justification: "Protection contre tilt et variance extrême"
      action: "Pause 24-48h, review processus"

    regle_4_drawdown_max:
      description: "Si -25% bankroll depuis peak → PAUSE 1 semaine"
      justification: "Réévaluation complète du système"
      action: "Analyser tous paris période, chercher leaks"

    regle_5_mise_minimale:
      description: "Jamais parier <1% bankroll"
      justification: "Si Kelly <1%, edge trop faible ou variance trop haute"
      decision: "Si Kelly suggère <1% → NO BET"

  ajustement_bankroll:
    frequence: "Hebdomadaire (chaque lundi)"
    methode: "Nouvelle bankroll = bankroll actuelle"
    justification: "Sizing s'adapte automatiquement aux gains/pertes"

    exemple:
      semaine_1:
        bankroll_debut: 1000
        mise_5pct: 50
      semaine_2_apres_gains:
        bankroll_debut: 1150
        mise_5pct: 57.5
      semaine_3_apres_pertes:
        bankroll_debut: 980
        mise_5pct: 49

  protection_psychologique:
    variance_acceptance:
      reality: "Même avec 60% winrate, losing streaks 5-7 paris normales"
      preparation: "S'attendre à drawdowns 15-20% (normal)"
      mindset: "Focus sur PROCESSUS, pas résultats court-terme"

    discipline:
      no_chase: "JAMAIS augmenter mises après pertes (chase losses)"
      no_tilt: "JAMAIS parier pour 'se refaire'"
      process_trust: "Si processus correct, variance se lisse long-terme"

# ============================================================================
# MÉTRIQUES DE PERFORMANCE
# ============================================================================
metriques_performance:

  description: |
    KPIs pour évaluer si le système fonctionne.
    Review mensuel obligatoire.

  kpi_1_roi:
    nom: "Return on Investment"
    formule: "(profit_net / total_mise) * 100"
    objectif: ">5% par mois (excellent)"
    benchmark: ">3% par mois (bon)"
    alerte: "<1% par mois (problème)"

  kpi_2_yield:
    nom: "Yield (ROI par pari)"
    formule: "profit_net / (nombre_paris * mise_moyenne)"
    objectif: ">8%"
    benchmark: ">5%"
    alerte: "<2%"

  kpi_3_winrate:
    nom: "Taux de réussite"
    formule: "paris_gagnes / total_paris"
    interpretation: "Dépend des cotes moyennes"
    exemple:
      cotes_basses_1_5_2_0: "Winrate attendu 60-65%"
      cotes_moyennes_2_0_3_0: "Winrate attendu 50-55%"
      cotes_hautes_3_0_plus: "Winrate attendu 40-45%"

  kpi_4_cotes_moyennes:
    nom: "Cote moyenne pariée"
    objectif: "1.80 - 2.50 (sweet spot)"
    justification: "Équilibre entre winrate et profit"

  kpi_5_edge_realise:
    nom: "Edge réalisé vs edge estimé"
    formule: "winrate_reel - winrate_implicite_cotes"
    objectif: ">3%"
    exemple:
      cotes_moyennes_2_00: "Winrate implicite 50%"
      notre_winrate: "55%"
      edge_realise: "5% (excellent)"

  kpi_6_calibration:
    nom: "Calibration des probabilités"
    methode: |
      Grouper paris par proba estimée (50-55%, 55-60%, etc.)
      Comparer winrate réel vs proba moyenne groupe
    objectif: "Différence <3% par groupe"
    interpretation: "Nos estimations sont-elles fiables?"

  red_flags:
    rf_1_winrate_faible:
      condition: "Winrate <45% sur cotes moyennes 2.00"
      probleme: "Nos probas surestimées OU malchance extrême"
      action: "Review calibration, vérifier biais"

    rf_2_edge_negatif:
      condition: "Edge réalisé <0% sur 50+ paris"
      probleme: "PAS de value réelle, illusion d'edge"
      action: "STOP immédiat, revoir système complet"

    rf_3_variance_anormale:
      condition: "Drawdown >30% avec processus correct"
      probleme: "Variance extrême OU erreur systématique cachée"
      action: "Pause 2 semaines, audit complet"

