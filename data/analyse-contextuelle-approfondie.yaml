# ============================================================================
# ANALYSE CONTEXTUELLE APPROFONDIE - EXTENSION AGENT #1
# ============================================================================
# Complément au système de base pour capturer TOUS les facteurs contextuels
# qui influencent le résultat d'un match au-delà des simples stats.
#
# PHILOSOPHIE:
# Un match de football n'est PAS juste des stats individuelles.
# Le CONTEXTE (enjeux, dynamique, duels, cohésion) peut avoir un impact
# aussi important que la qualité pure des joueurs.
#
# USAGE:
# - Agent #1 enrichi collecte ces données
# - Agent #4 intègre ces facteurs dans ajustements probabilités
# - Agent #6 détecte anomalies/red flags avant de parier
# ============================================================================

# ============================================================================
# 1. HISTORIQUE 5 DERNIERS MATCHS - ANALYSE APPROFONDIE
# ============================================================================
analyse_historique_approfondie:

  description: |
    Collecter NON seulement les stats brutes (buts, corners, cartons)
    mais aussi l'ANALYSE QUALITATIVE de chaque match:
    - Système de jeu adverse
    - Performance offensive/défensive
    - Enjeu du match
    - Explication du résultat (comment, pourquoi)

  structure_donnees_par_match:

    informations_base:
      - date
      - adversaire
      - competition
      - lieu (domicile/exterieur)
      - resultat (score)
      - classement_equipe (au moment du match)
      - classement_adversaire

    stats_brutes:
      - buts_pour
      - buts_contre
      - xG_pour
      - xG_contre
      - corners_pour
      - corners_contre
      - cartons_jaunes
      - cartons_rouges
      - possession_pct
      - tirs_cadres
      - fautes_commises
      - fautes_subies

    systeme_jeu:
      formation_equipe: "Ex: 4-3-3"
      formation_adversaire: "Ex: 5-4-1"
      style_adversaire:
        - "defensif_bloc_bas"
        - "offensif_pressing_haut"
        - "contre_attaque"
        - "possession"
        - "direct_long"
      adaptation_tactique: |
        Comment l'équipe a répondu au système adverse?

    performance_offensive:
      qualite: "faible / moyenne / bonne / excellente"
      efficacite_finition: "Gâchis / Normal / Clinique"
      creation_chances: "Stérile / Moyenne / Prolifique"
      variete_jeu: "Prévisible / Varié"
      notes: "Commentaires qualitatifs"

    performance_defensive:
      qualite: "faible / moyenne / bonne / excellente"
      solidite: "Fragile / Correcte / Solide / Hermétique"
      organisation: "Désorganisée / Structurée"
      vulnerabilites: "Liste points faibles exposés"
      notes: "Commentaires qualitatifs"

    enjeu_match:
      type_enjeu:
        - "aucun" (match sans pression)
        - "faible" (mi-saison, milieu tableau)
        - "moyen" (top 6, Europe)
        - "eleve" (top 4, titre)
        - "tres_eleve" (relégation, finale)
      pression: "basse / moyenne / haute / critique"
      impact_resultat: |
        Conséquences du résultat (montée classement, sortie zone rouge, etc.)

    explication_resultat:
      comment: |
        Déroulé tactique du match, moments clés, tournants

      pourquoi: |
        Facteurs explicatifs du résultat (domination méritée,
        chance, erreurs adverses, arbitrage, etc.)

      facteurs_decisifs:
        - "Qualité supérieure"
        - "Réalisme offensif"
        - "Erreur défensive adverse"
        - "Chance/Malchance"
        - "Arbitrage favorable/défavorable"
        - "Condition physique supérieure"
        - "Intensité/Motivation supérieure"

    tendances_identifiees:
      - "Trend offensive (amélioration/dégradation)"
      - "Trend défensive"
      - "Constance performance"
      - "Patterns récurrents"

  # EXEMPLE CONCRET - Liverpool
  exemple_liverpool_5_derniers:

    match_1:
      date: "2024-03-23"
      adversaire: "Manchester United"
      lieu: "Old Trafford"
      competition: "Premier League"
      resultat: "2-2"
      classement: "2ème (70pts)"
      classement_adversaire: "6ème (51pts)"

      stats_brutes:
        buts: 2
        xG: 2.8
        corners: 9
        cartons: 3
        possession: 58

      systeme_jeu:
        formation_liverpool: "4-3-3"
        formation_united: "4-2-3-1"
        style_united: "contre_attaque rapide"
        adaptation: "Liverpool dominant mais vulnérable transitions"

      performance_offensive:
        qualite: "excellente"
        efficacite_finition: "normale (2.8 xG → 2 buts)"
        creation_chances: "prolifique (2.8 xG)"
        variete_jeu: "varié (centres + jeu court)"
        notes: "Domination territoriale totale, 9 corners, mais United dangereux en transition"

      performance_defensive:
        qualite: "moyenne"
        solidite: "fragile sur transitions"
        organisation: "ligne haute exposée"
        vulnerabilites:
          - "Espaces dans le dos défense (vitesse Rashford)"
          - "Duels aériens corners concédés"
        notes: "2 buts encaissés sur 1.2 xG (sous-performance défensive)"

      enjeu_match:
        type_enjeu: "eleve"
        pression: "haute"
        impact_resultat: "2 points perdus dans course au titre vs Arsenal"

      explication_resultat:
        comment: |
          Liverpool domine (58% possession, 2.8 xG vs 1.2), mène 2-0 à la 60e.
          United revient 2-2 grâce à 2 contre-attaques éclair (Rashford 67', 82').
          Liverpool pousse fin de match mais n'arrive pas à reprendre l'avantage.

        pourquoi: |
          Domination Liverpool méritée mais naïveté défensive.
          Ligne haute exposée face à vitesse Rashford/Garnacho.
          United clinique (1.2 xG → 2 buts, efficacité 167%).
          Liverpool gâche plusieurs occasions fin de match.

        facteurs_decisifs:
          - "Vitesse United en transition"
          - "Ligne haute Liverpool trop risquée"
          - "Efficacité clinique United"
          - "Liverpool manque de réalisme (2.8 xG → 2 buts)"

      tendances_identifiees:
        - "⚠️ Vulnérabilité défensive récurrente sur transitions"
        - "✅ Domination territoriale constante"
        - "✅ Création chances prolifique"
        - "⚠️ Finition perfectible"

    match_2:
      date: "2024-03-16"
      adversaire: "Brighton"
      lieu: "Anfield"
      resultat: "2-1"
      enjeu: "moyen"

      explication_courte: |
        Victoire laborieuse. Brighton bien organisé (5-4-1), Liverpool
        domine (2.4 xG vs 1.3) mais manque de tranchant. But décisif 78e.
        Clean sheet évité de justesse (but Brighton 85e).

      tendances:
        - "⚠️ Difficulté à casser blocs bas"
        - "⚠️ Concentration defensive faiblit fin match"

    match_3:
      date: "2024-03-10"
      adversaire: "Manchester City"
      lieu: "Etihad"
      resultat: "1-1"
      enjeu: "tres_eleve"

      explication_courte: |
        Choc au sommet. Match équilibré (1.8 xG vs 2.1 xG City).
        Intensité énorme, peu d'espaces. Liverpool solide défensivement
        (Rodri absent chez City = occasion ratée). Nul logique.

      tendances:
        - "✅ Performance solide vs top équipe"
        - "⚠️ Rodri absent = City affaibli, opportunité manquée"

    match_4:
      date: "2024-03-03"
      adversaire: "Nottingham Forest"
      lieu: "Anfield"
      resultat: "3-0"
      enjeu: "faible"

      explication_courte: |
        Victoire facile attendue. Forest bloc bas (5-5-0), Liverpool
        patient, 3 buts (20', 54', 71'). Domination totale (3.1 xG vs 0.3).
        Clean sheet, gestion mature.

      tendances:
        - "✅ Efficace vs équipes faibles"
        - "✅ Clean sheet domicile"

    match_5:
      date: "2024-02-25"
      adversaire: "Chelsea"
      lieu: "Stamford Bridge"
      resultat: "4-1"
      enjeu: "moyen"

      explication_courte: |
        Performance dominante. Chelsea désorganisé (changement coach récent),
        Liverpool clinique (3.5 xG → 4 buts). Salah triplé. Chelsea réduit
        score 90e (garbage time).

      tendances:
        - "✅ Réalisme offensif excellent"
        - "✅ Exploitation faiblesses adverses"

  # SYNTHÈSE TENDANCES LIVERPOOL (5 derniers)
  synthese_tendances_liverpool:

    forme_generale:
      points: "10/15 (2V 4N 1D)"
      note: "Bonne forme mais pas excellente"
      trend: "Stable, performances solides"

    offensive:
      xG_moyen: 2.5
      buts_moyens: 2.4
      efficacite: "96% (légèrement sous xG)"
      qualite: "Excellente création, finition correcte"
      constance: "Haute (2.5+ xG dans 4/5 matchs)"

    defensive:
      xG_contre_moyen: 1.3
      buts_concedes_moyens: 1.2
      efficacite: "92% (légèrement sur-performante)"
      qualite: "Correcte mais vulnérable transitions"
      probleme_recurrent: "⚠️ Ligne haute exposée (Rashford, contre-attaques)"

    vs_differents_profils:
      vs_top_equipes: "Solide (1N vs City, 2-2 vs United)"
      vs_milieu_tableau: "Bon (2-1 Brighton laborieux)"
      vs_equipes_faibles: "Dominant (3-0 Forest, 4-1 Chelsea)"

    systemes_adverses_rencontres:
      bloc_bas: "3/5 matchs → Difficulté à casser"
      contre_attaque: "2/5 matchs → Vulnérable"
      pressing_haut: "1/5 matchs → À l'aise"

    facteurs_cles_identifes:
      forces:
        - "Domination territoriale constante"
        - "Création chances prolifique (2.5 xG/match)"
        - "Efficace vs équipes faibles"
        - "Salah en forme (4 buts sur 5 matchs)"

      faiblesses:
        - "⚠️ Vulnérabilité défensive transitions rapides"
        - "⚠️ Difficulté à casser blocs bas organisés"
        - "⚠️ Concentration fin de match (buts concédés 80-90e)"
        - "⚠️ Réalisme offensif perfectible (légèrement sous xG)"

    implications_vs_everton:
      systeme_everton_attendu: "5-4-1 bloc bas"
      historique_vs_ce_systeme: "Difficulté récente (Brighton 2-1 laborieux)"
      ajustement_proba:
        buts_liverpool: "-0.2 (difficulté à casser blocs bas)"
        clean_sheet: "+0.1 (Everton faible offensive)"
      confiance: 0.88

# ============================================================================
# 2. VALEUR/ENJEU DU MATCH - QUANTIFICATION
# ============================================================================
valeur_enjeu_match:

  description: |
    Plus l'enjeu est élevé, plus les équipes sont PRUDENTES et CONCENTRÉES.
    Résultat: MOINS de surprises, favoris plus fiables.
    Inversement: matchs sans enjeu = imprévisibles (rotation, motivation faible).

  echelle_enjeu:

    niveau_5_critique:
      exemples:
        - "Finale Coupe (élimination directe)"
        - "Dernier match saison, relégation en jeu"
        - "Dernier match saison, titre en jeu"
        - "Match barrage promotion/relégation"
      caracteristiques:
        - "Pression MAXIMALE"
        - "Aucune rotation (meilleur XI)"
        - "Intensité 110%"
        - "Prudence élevée (éviter erreurs)"
        - "Peu de buts (matches serrés)"
      impact_probabilites:
        favoris_fiabilite: "+15% (favoris plus sûrs)"
        surprises: "-40% (upsets rares)"
        total_buts: "-0.3 (matches tendus)"
        cartons: "+0.5 (intensité physique)"
      confiance_paris: "HAUTE (peu d'aléas)"

    niveau_4_tres_eleve:
      exemples:
        - "Match top 2, titre en jeu"
        - "Match top 4, qualification CL en jeu"
        - "Relegation battle (J30-J38)"
        - "Derby avec enjeu classement"
      caracteristiques:
        - "Pression très haute"
        - "Peu de rotation"
        - "Intensité très élevée"
        - "Concentration maximale"
      impact_probabilites:
        favoris_fiabilite: "+10%"
        surprises: "-30%"
        total_buts: "-0.2"
        cartons: "+0.4"
      confiance_paris: "HAUTE"

    niveau_3_eleve:
      exemples:
        - "Match top 6"
        - "Match European spots (5-7e place)"
        - "Relegation bataille (J20-J30)"
      caracteristiques:
        - "Pression haute"
        - "Rotation minimale"
        - "Intensité élevée"
      impact_probabilites:
        favoris_fiabilite: "+5%"
        surprises: "-15%"
        total_buts: "-0.1"
        cartons: "+0.2"
      confiance_paris: "MOYENNE-HAUTE"

    niveau_2_moyen:
      exemples:
        - "Match mid-table sans enjeu particulier"
        - "Début de saison (J1-J10)"
        - "Coupe nationale tours précoces"
      caracteristiques:
        - "Pression normale"
        - "Rotation possible"
        - "Intensité standard"
      impact_probabilites:
        favoris_fiabilite: "0%"
        surprises: "0%"
        total_buts: "0"
        cartons: "0"
      confiance_paris: "MOYENNE"

    niveau_1_faible:
      exemples:
        - "Dernière journée, classement figé"
        - "Match avec équipe qualifiée/reléguée déjà"
        - "Match amical"
        - "Fin de saison sans enjeu"
      caracteristiques:
        - "Pression basse/nulle"
        - "Rotation MASSIVE"
        - "Intensité faible"
        - "Motivation variable"
      impact_probabilites:
        favoris_fiabilite: "-15% (moins fiables)"
        surprises: "+40% (upsets fréquents)"
        total_buts: "+0.2 (défenses relâchées)"
        cartons: "-0.3 (intensité faible)"
      confiance_paris: "⚠️ FAIBLE - ÉVITER"

  formule_quantification:

    score_enjeu_total: |
      score = (enjeu_equipe_1 + enjeu_equipe_2) / 2

      Avec enjeu_equipe = somme pondérée:
        - enjeu_classement (0-10)
        - enjeu_qualification (0-10)
        - enjeu_relegation (0-10)
        - enjeu_prestige (0-5)
        - enjeu_derby (0-5)

    enjeu_classement:
      calcul: |
        IF position 1-4: score = 10 - (points_avance_5e / 3)
        IF position 5-7: score = 7
        IF position 8-12: score = 3
        IF position 13-17: score = 5
        IF position 18-20: score = 10 - (points_avance_21e / 3)

      interpretation: |
        Plus l'écart est faible, plus l'enjeu est élevé.
        Course au titre serrée = enjeu 10
        5e place acquise = enjeu 3

    enjeu_derby:
      calcul: |
        Derby local traditionnel = +5
        Derby régional = +3
        Rivalité historique = +4

  # EXEMPLE CONCRET
  exemple_liverpool_vs_everton:

    liverpool_enjeux:
      position: "2ème"
      points: 70
      ecart_1er_arsenal: -2 points
      ecart_3e_city: +3 points

      enjeu_classement:
        situation: "Course au titre serrée"
        score: 9.5
        justification: "2 points de retard sur Arsenal, chaque point critique"

      enjeu_qualification:
        situation: "CL déjà quasi-assurée"
        score: 2

      enjeu_prestige:
        situation: "Derby local"
        score: 5

      total_liverpool: 16.5

    everton_enjeux:
      position: "16ème"
      points: 29
      ecart_18e_luton: +4 points

      enjeu_relegation:
        situation: "Danger relégation (4 points avance)"
        score: 8.5
        justification: "Zone rouge à 4 points, chaque point vital"

      enjeu_prestige:
        situation: "Derby local"
        score: 5

      total_everton: 13.5

    score_enjeu_match:
      formule: "(16.5 + 13.5) / 2 = 15.0"
      niveau: "TRÈS ÉLEVÉ (niveau 4)"

    implications:
      interpretation: |
        Match CRITIQUE pour les deux équipes:
        - Liverpool: Course au titre (2 pts de retard)
        - Everton: Bataille relégation (4 pts d'avance seulement)
        + Derby local (intensité émotionnelle)

      impact_probabilites:
        favoris_liverpool: "+10% fiabilité (enjeu = concentration max)"
        surprises_everton: "-30% (moins de chance upset)"
        intensite_match: "+20%"
        cartons: "+0.4 (derby + enjeux)"
        prudence_defenses: "+15%"

      implications_paris:
        favoris_liverpool: "Plus fiable que d'habitude"
        cote_1_28: "Justifiée voire généreuse (enjeu haut)"
        total_buts: "Potentiellement réduit (prudence)"
        cartons: "⭐ Augmentés (derby + enjeux + intensité)"

      red_flags: []
      green_flags:
        - "✅ Enjeu très élevé = match prévisible"
        - "✅ Les deux équipes motivées au max"
        - "✅ Peu de rotation attendue"

# ============================================================================
# 3. ANOMALIES & RED FLAGS
# ============================================================================
detection_anomalies:

  description: |
    Identifier les signaux d'alerte qui peuvent invalider l'analyse
    ou créer des opportunités contre-intuitives.

  categories_anomalies:

    anomalies_composition:
      rotation_massive_inattendue:
        detection: "5+ changements vs équipe type"
        causes:
          - "Match important suivant (CL, finale)"
          - "Fatigue calendrier"
          - "Blessures multiples"
        impact: "⚠️ Force équipe réduite -20-30%"
        action: "RÉVISER probabilités fortement"

      absence_joueur_cle_non_anticipee:
        detection: "Joueur impact >0.5 absent (annonce H-3h)"
        impact: "⚠️ Ajuster probabilités selon impacts tags"
        action: "Recalculer, potentiellement annuler paris"

      surprise_tactique:
        detection: "Changement formation inhabituelle"
        impact: "⚠️ Incertitude élevée"
        action: "Réduire confiance 20%, augmenter seuil edge"

    anomalies_cotes:
      mouvement_massif_ligne:
        detection: "Cote bouge >15% en <2h"
        causes_possibles:
          - "Info blessure non publique"
          - "Sharp money massif"
          - "Erreur bookmaker (rare)"
        action: "⚠️ INVESTIGUER avant parier, info manquante probable"

      ecart_inter_bookmakers:
        detection: "Écart >10% entre bookmakers"
        causes:
          - "Limite compte joueur (arb)"
          - "Erreur saisie bookmaker"
          - "Vision divergente sharp vs public"
        action: "⚠️ Comprendre pourquoi avant exploiter"

      cote_trop_belle:
        detection: "Edge apparent >30% sans raison valide"
        interpretation: "Probablement piège ou info manquante"
        action: "❌ NO BET - Si trop beau pour être vrai, c'est faux"

    anomalies_contextuelles:
      motivation_asymetrique:
        exemple: "Équipe 1 joue titre, Équipe 2 milieu tableau sans enjeu"
        impact: "Équipe 1 sur-motivée, Équipe 2 peut 'laisser filer'"
        ajustement: "+0.3 probabilité Équipe 1"

      facteur_emotionnel_fort:
        exemples:
          - "Hommage joueur décédé"
          - "Dernier match manager viré"
          - "Scandale récent club"
        impact: "⚠️ Imprévisible, réactions émotionnelles"
        action: "Réduire confiance 30% OU éviter"

      calendrier_desequilibre:
        exemple: "Équipe 1 repose 7 jours, Équipe 2 joué il y a 3 jours"
        impact: "Avantage physique Équipe 1"
        ajustement: "+0.15 probabilité Équipe 1"

    anomalies_statistiques:
      sur_performance_xg_prolongee:
        detection: "Équipe surperforme xG >20% sur 10+ matchs"
        interpretation: "Regression probable vers xG"
        ajustement: "Réduire probabilités buts 10-15%"

      sous_performance_xg_prolongee:
        detection: "Équipe sous-performe xG >20% sur 10+ matchs"
        interpretation_double:
          - "Malchance → Regression positive à venir"
          - "Problème réel finition → Continuer sous-perf"
        action: "Analyser causes, prudence"

      clean_sheet_streak_anormale:
        detection: "6+ clean sheets alors que xG_contre suggère 3-4 buts concédés"
        interpretation: "Gardien sur-performance OU chance défensive"
        ajustement: "Anticiper régression, clean sheet moins probable"

  # EXEMPLE - Liverpool vs Everton
  check_anomalies_liverpool_everton:

    compositions:
      liverpool_rotation: "NON (composition attendue confirmée)"
      everton_rotation: "NON (meilleur XI attendu)"
      absences_imprevues: "AUCUNE"
      statut: "✅ Aucune anomalie"

    cotes:
      mouvement_lines: "Stable (<5% variation)"
      ecart_bookmakers: "Normal (<5%)"
      cote_suspecte: "NON"
      statut: "✅ Aucune anomalie"

    contexte:
      motivation_asymetrique: "NON (les deux très motivés)"
      facteur_emotionnel: "NON"
      calendrier:
        liverpool_repos: "7 jours"
        everton_repos: "7 jours"
        desequilibre: "NON"
      statut: "✅ Équilibré"

    statistiques:
      liverpool_vs_xg: "96% efficacité (normale)"
      everton_vs_xg: "102% efficacité (normale)"
      statut: "✅ Aucune anomalie"

    conclusion: "✅ AUCUNE ANOMALIE DÉTECTÉE - Analyse fiable"

  # CONTRE-EXEMPLE avec anomalies
  exemple_avec_anomalies:
    match: "Manchester City vs Tottenham"

    anomalie_1:
      type: "rotation_massive"
      detail: "City joue Real Madrid (CL) dans 3 jours"
      joueurs_reposes_attendus: "Haaland, Rodri, De Bruyne (5-6 changements)"
      impact: "⚠️ Force City réduite -25%"
      action: "Réviser proba City victoire 75% → 58%"

    anomalie_2:
      type: "mouvement_cote_massif"
      detail: "Cote Tottenham victoire 4.50 → 3.20 en 2h"
      investigation: "Rumeur Haaland forfait (pas confirmée officiellement)"
      action: "⚠️ ATTENDRE confirmation lineup H-1h30"

    anomalie_3:
      type: "sur_performance_xg"
      detail: "Tottenham 18 buts sur 12 xG (10 matchs)"
      interpretation: "Efficacité 150% = régression probable"
      action: "Réduire proba buts Tottenham -15%"

    decision_finale: "⚠️ TROP D'ANOMALIES - ÉVITER CE MATCH"

# ============================================================================
# 4. MATCHS À VENIR - GESTION CALENDRIER
# ============================================================================
analyse_calendrier:

  description: |
    Les matchs APRÈS influencent le match actuel:
    - Match important suivant → Rotation probable
    - Calendrier chargé → Fatigue
    - Calendrier léger → Fraîcheur optimale

  facteurs_calendrier:

    match_suivant_importance:
      match_crucial_j_plus_3:
        exemples:
          - "CL knockout dans 3 jours"
          - "Finale coupe dans 4 jours"
          - "Derby dans 3 jours"
        impact: "⚠️ Rotation probable -20% force équipe"
        detection: "Vérifier calendrier UEFA/Coupe"

      match_normal_j_plus_7:
        impact: "Aucun (repos standard)"

    densite_calendrier:
      calendrier_surchage:
        definition: "3+ matchs en 7 jours"
        impact:
          fatigue_physique: "-10% performance"
          blessures_accrues: "+30% risque"
